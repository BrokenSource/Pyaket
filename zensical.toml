# Note: Experimental transition to zensical from mkdocs and its plugins

# Fixme: Missing gen-files, mkdocstrings, snippets include, etc.
# Fixme: Extend from a base configuration when supported

[project]
site_name = "Pyaket"
site_description = "📦 Easy Python to Fast Executables"
site_author = "Tremeschin"
site_url  = "https://pyaket.tremeschin.com/"
repo_url  = "https://github.com/BrokenSource/Pyaket/"
repo_name = "BrokenSource/Pyaket"
edit_uri  = "edit/main/website/"
copyright = "&copy; CC BY-SA 4.0, <a href='https://github.com/Tremeschin/'>Tremeschin</a> 🇧🇷"
docs_dir  = "website"
nav = [
  {Home = [
    "index.md",
    "about/community.md",
    "about/contributing.md",
    "about/changelog.md",
    "about/roadmap.md",
    "about/contact.md",
    "about/mission.md",
    "about/license.md",
    "about/credits.md",
  ]},
  {Installation = [
    "get/index.md",
    {Packages = [
      "get/python.md",
      "get/release.md",
      "get/source.md",
      "get/docker.md",
    ]},
    {Workflows = [
      "get/ci/github.md",
      "get/ci/gitlab.md",
    ]},
    {Tools = [
      "get/rust.md",
    ]},
  ]},
  {Examples = [
    "examples/index.md",
  ]},
  {Documentation = [
    "docs/index.md",
    {Configuration = [
      "docs/project/application.md",
      "docs/project/dependencies.md",
      "docs/project/directories.md",
      "docs/project/python.md",
      "docs/project/pytorch.md",
      "docs/project/entry.md",
    ]},
    {Rust = [
      "docs/rust/profiles.md",
      "docs/rust/crosscompiling.md",
    ]},
    {Extra = [
      "docs/pinning.md",
    ]},
  ]},
  {Questions = [
    {General = [
      "faq/general.md",
      "faq/alternatives.md",
    ]},
    {Systems = [
      "faq/windows.md",
      "faq/linux.md",
      "faq/macos.md",
    ]},
  ]},
]

# Fixme: Common monorepo theme
extra_css = ["css/main.css"]

# ---------------------------------------------------------------------------- #

[project.theme]
variant = "modern"
favicon = "assets/images/logo.png"
language = "en"
features = [
  "announce.dismiss",
  "content.action.view",
  "content.code.annotate",
  "content.code.copy",
  "content.footnote.tooltips",
  "content.tabs.link",
  "content.tooltips",
  "navigation.expand",
  "navigation.footer",
  "navigation.indexes",
  "navigation.instant.prefetch",
  "navigation.instant.progress",
  "navigation.instant",
  "navigation.path",
  "navigation.tabs",
  "navigation.top",
  "search.highlight",
  "toc.follow",
]

[project.extra.status]
wip = "Work in Progress"
deprecated = "Deprecated"

# ---------------------------------------------------------------------------- #

[project.theme.icon]
logo = "octicons/package-16"
repo = "fontawesome/brands/github"

[project.theme.font]
text = "Inter"
code = "Cascadia Code"

[[project.theme.palette]]
toggle.icon = "lucide/sun"
toggle.name = "Switch to dark mode"
media       = "(prefers-color-scheme: light)"
scheme      = "default"
primary     = "blue"
accent      = "light-blue"

[[project.theme.palette]]
toggle.icon = "lucide/moon"
toggle.name = "Switch to light mode"
media       = "(prefers-color-scheme: dark)"
scheme      = "slate"
primary     = "orange"
accent      = "orange"

[[project.extra.social]]
icon = "fontawesome/brands/discord"
link = "https://discord.gg/KjqvcYwRHm"

[[project.extra.social]]
icon = "fontawesome/brands/patreon"
link = "https://www.patreon.com/Tremeschin"

[[project.extra.social]]
icon = "fontawesome/brands/github"
link = "https://github.com/Tremeschin"

[[project.extra.social]]
icon = "fontawesome/brands/youtube"
link = "https://www.youtube.com/@Tremeschin"
